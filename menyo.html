<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الفخامة | نور</title>
    <style>
        /* الألوان: برتقالي وأسود (ألوان تفتح النفس للأكل) */
        :root { --main: #ff6b6b; --dark: #1a1a1a; --gold: #ffd700; }
        
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); color: white; scroll-behavior: smooth; }

        /* الواجهة الأولى (Intro) */
        #intro-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            text-align: center;
        }

        #intro-page h1 { font-size: 3rem; margin-bottom: 10px; color: var(--gold); text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        #intro-page p { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.9; }

        .enter-btn {
            background: var(--main);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }
        .enter-btn:hover { transform: scale(1.1); background: var(--gold); color: black; }

        /* صفحة المنيو (Menu) */
        #menu-page { display: none; padding: 20px; }
        
        .header-menu { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main); padding-bottom: 10px; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .food-card {
            background: #2a2a2a;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .food-card:hover { border-color: var(--main); }
        .food-card img { width: 100%; height: 180px; object-fit: cover; }
        .food-info { padding: 15px; }
        .food-info h3 { margin: 0; color: var(--gold); }
        .food-info p { font-size: 14px; opacity: 0.7; }
        .price { color: var(--main); font-weight: bold; font-size: 1.2rem; display: block; margin-top: 10px; }

        /* لوحة المشرف */
        #admin-panel { display: none; background: #333; padding: 20px; border-radius: 10px; margin-top: 20px; border: 2px dashed var(--gold); }
        input { width: 90%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
        .admin-btn { background: var(--gold); color: black; border: none; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="intro-page">
        <h1>أهلاً بك في مطعم الفخامة</h1>
        <p>تذوق الطعم الأصيل في كل قطعة</p>
        <button class="enter-btn" onclick="showMenu()">اضغط لدخول المطعم 🍕</button>
    </div>

    <div id="menu-page">
        <div class="header-menu">
            <h2>قائمة الطعام (المنيو)</h2>
            <button onclick="loginAdmin()" style="background:none; border:none; color:grey; cursor:pointer;">دخول المشرف</button>
        </div>

        <div id="admin-panel">
            <h3>إضافة صنف جديد</h3>
            <input type="text" id="foodName" placeholder="اسم الأكلة">
            <input type="text" id="foodDesc" placeholder="وصف قصير">
            <input type="text" id="foodPrice" placeholder="السعر (جنيه)">
            <input type="text" id="foodImg" placeholder="رابط صورة الأكلة">
            <button class="admin-btn" onclick="addNewFood()">إضافة للمنيو</button>
        </div>

        <div class="menu-grid" id="menuGrid">
            </div>
    </div>

    <script>
        // 1. التنقل بين الصفحات
        function showMenu() {
            document.getElementById('intro-page').style.display = 'none';
            document.getElementById('menu-page').style.display = 'block';
            renderMenu();
        }

        // 2. نظام المشرف
        function loginAdmin() {
            let pass = prompt("من فضلك أدخل كلمة السر الخاصة بالمشرف:");
            if (pass === "ASDzxc@123") {
                document.getElementById('admin-panel').style.display = 'block';
                alert("أهلاً بك يا نور (المشرف)");
            } else {
                alert("كلمة سر خطأ!");
            }
        }

        // 3. إدارة البيانات
        let menuItems = JSON.parse(localStorage.getItem('restaurantMenu')) || [
            { name: "بيتزا مشكل جبن", desc: "أقوى ميكس جبن إيطالي", price: "120", img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=500&q=60" },
            { name: "برجر عملاق", desc: "لحم بقري صافي مع صوص خاص", price: "95", img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=500&q=60" }
        ];

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';
            menuItems.forEach(item => {
                grid.innerHTML += `
                    <div class="food-card">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="food-info">
                            <h3>${item.name}</h3>
                            <p>${item.desc}</p>
                            <span class="price">${item.price} جنيه</span>
                        </div>
                    </div>
                `;
            });
            localStorage.setItem('restaurantMenu', JSON.stringify(menuItems));
        }

        function addNewFood() {
            let name = document.getElementById('foodName').value;
            let desc = document.getElementById('foodDesc').value;
            let price = document.getElementById('foodPrice').value;
            let img = document.getElementById('foodImg').value || 'https://via.placeholder.com/150';

            if(name && price) {
                menuItems.push({ name, desc, price, img });
                renderMenu();
                // مسح الخانات بعد الإضافة
                document.getElementById('foodName').value = '';
                document.getElementById('foodDesc').value = '';
                document.getElementById('foodPrice').value = '';
                document.getElementById('foodImg').value = '';
            }
        }
    </script>
</body>
</html>
